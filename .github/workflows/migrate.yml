name: Run database migrations

# Idempotent: runs on every push to main; alembic does nothing if no new
# revisions exist. Keeps prod schema in lock-step with code without manual
# steps. (Vercel can't run migrations on its own — its Python runtime is
# request-scoped, so we use this Action as the deploy hook.)
on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual run from the Actions tab

jobs:
  alembic-upgrade:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run alembic upgrade
        env:
          # Use Session pooler (IPv4, port 5432). Supabase's "Direct connection"
          # is IPv6-only and GitHub-hosted runners have no IPv6 — it fails with
          # "Network is unreachable". Transaction pooler also won't work because
          # alembic runs DDL inside transactions. Despite the secret name, the
          # value stored in DATABASE_URL_DIRECT is the Session pooler string.
          DATABASE_URL: ${{ secrets.DATABASE_URL_DIRECT }}
          # Settings() requires these — values aren't read by alembic but
          # config.py validates on import.
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
        run: alembic upgrade head
