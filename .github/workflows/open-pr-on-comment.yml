name: Open PR on "測試通過" comment

# Manual gate: PR is NOT auto-opened after smoke check. Instead, after the user
# has manually verified the preview, they comment "測試通過" on the issue and this
# workflow opens the PR for the corresponding `claude/issue-<N>` branch.

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  open-pr:
    name: Open PR for issue branch
    # Skip PR comments (issue_comment fires for both); require trigger phrase.
    # Only the repo owner's "測試通過" counts — ignore bots and any other commenter.
    if: ${{ !github.event.issue.pull_request && contains(github.event.comment.body, '測試通過') && github.event.comment.user.login == 'myduotopia' }}
    runs-on: ubuntu-latest
    steps:
      - name: Create PR if missing, then comment its URL on the issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUM="${{ github.event.issue.number }}"
          REPO="${{ github.repository }}"
          BRANCH="claude/issue-${ISSUE_NUM}"

          # Verify branch exists on remote before attempting PR
          if ! gh api "repos/${REPO}/branches/${BRANCH}" >/dev/null 2>&1; then
            gh issue comment "$ISSUE_NUM" --repo "$REPO" \
              --body ":warning: Got \"測試通過\" but branch \`${BRANCH}\` doesn't exist on remote — nothing to open."
            exit 0
          fi

          PR_URL=$(gh pr list --repo "$REPO" --head "$BRANCH" --state open --json url --jq '.[0].url // ""')

          if [[ -z "$PR_URL" ]]; then
            ISSUE_TITLE=$(gh issue view "$ISSUE_NUM" --repo "$REPO" --json title --jq '.title')
            PR_BODY=$(printf '%s\n' \
              "Closes #${ISSUE_NUM}" \
              "" \
              "Opened by \`open-pr-on-comment\` workflow after user confirmed \"測試通過\" on issue #${ISSUE_NUM}." \
              "" \
              "## Verification" \
              "- [x] Smoke check passed (preview URLs live)" \
              "- [x] Manual UI testing on preview URLs (user confirmed)" \
              "- [ ] Issue acceptance criteria reviewed")
            PR_URL=$(gh pr create \
              --repo "$REPO" \
              --base staging \
              --head "$BRANCH" \
              --title "[#${ISSUE_NUM}] ${ISSUE_TITLE}" \
              --body "$PR_BODY")
            echo "Created: $PR_URL"
          else
            echo "PR already exists: $PR_URL"
          fi

          gh issue comment "$ISSUE_NUM" --repo "$REPO" \
            --body ":link: PR for this branch: ${PR_URL}"
