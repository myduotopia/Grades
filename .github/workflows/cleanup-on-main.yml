name: Cleanup merged issue branches

# Runs after every push to main (typically a staging -> main merge). Finds
# every remote claude/issue-* branch whose tip is now reachable from main,
# deletes it (which also tears down its Vercel preview), and closes the
# matching issue with a cleanup comment.
#
# Intentionally does NOT touch local worktrees or local branches — that
# stays manual per the user's "deferred cleanup" rule.

on:
  push:
    branches: [main]

permissions:
  contents: write   # delete remote branches
  issues: write     # comment + close

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history for ancestor checks

      - name: Delete merged issue branches and close issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          git fetch origin --prune

          # List remote claude/issue-* branches
          branches=$(git for-each-ref --format='%(refname:short)' refs/remotes/origin \
                     | grep -E '^origin/claude/issue-[0-9]+$' || true)

          if [[ -z "$branches" ]]; then
            echo "No claude/issue-* branches on origin. Nothing to do."
            exit 0
          fi

          for ref in $branches; do
            branch="${ref#origin/}"                       # claude/issue-N
            issue_num="${branch##*-}"                     # N
            tip=$(git rev-parse "$ref")

            if git merge-base --is-ancestor "$tip" origin/main; then
              echo "MERGED: $branch (tip $tip) is in main — cleaning up"

              # Delete remote branch (Vercel auto-tears-down its preview)
              git push origin --delete "$branch" || echo "  (branch already gone)"

              # Comment + close the issue if still open
              state=$(gh issue view "$issue_num" --repo "$REPO" --json state --jq '.state' 2>/dev/null || echo "MISSING")
              if [[ "$state" == "MISSING" ]]; then
                echo "  issue #$issue_num not found, skipping comment"
                continue
              fi

              gh issue comment "$issue_num" --repo "$REPO" --body "$(printf '%s\n' \
                ':broom: **Cleanup** — branch `'"$branch"'` 已合併進 `main`，遠端 branch 與 Vercel preview 已自動清理。' \
                '' \
                '本地 `.worktree/'"$issue_num"'` 與本地 branch 保留，待你說「clean up issue '"$issue_num"'」再處理。')"

              if [[ "$state" == "OPEN" ]]; then
                gh issue close "$issue_num" --repo "$REPO" --reason completed || true
              fi
            else
              echo "skip: $branch not yet in main"
            fi
          done
