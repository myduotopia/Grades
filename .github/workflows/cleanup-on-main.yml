name: Cleanup merged issue branches

# Runs after every push to main (typically a staging -> main merge). Finds
# every remote claude/issue-* branch whose PR has been merged, deletes it
# (which also tears down its Vercel preview), and closes the matching
# issue with a cleanup comment.
#
# Why we check "PR merged" instead of "tip is ancestor of main": the repo
# uses squash-merge, so the branch's original tip commit never lands in
# main's history — `git merge-base --is-ancestor` would always return false
# and the cleanup would silently no-op. A merged PR is the strategy-agnostic
# signal that the work is done. Because this workflow only fires on push to
# main, by the time we run any "merged into staging" PR has already been
# promoted to main via the staging -> main merge, so deletion is safe.
#
# Intentionally does NOT touch local worktrees or local branches — that
# stays manual per the user's "deferred cleanup" rule.

on:
  push:
    branches: [main]

permissions:
  contents: write   # delete remote branches
  issues: write     # comment + close

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete merged issue branches and close issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # List remote claude/issue-* branches via the API (no checkout needed)
          mapfile -t branches < <(
            gh api "repos/$REPO/branches?per_page=100" --paginate \
              --jq '.[].name | select(test("^claude/issue-[0-9]+$"))'
          )

          if [[ ${#branches[@]} -eq 0 ]]; then
            echo "No claude/issue-* branches on origin. Nothing to do."
            exit 0
          fi

          for branch in "${branches[@]}"; do
            issue_num="${branch##*-}"                     # N

            # Strategy-agnostic merge check: did this branch have a PR merged?
            # Works for squash, merge-commit, and rebase strategies.
            merged_count=$(gh pr list --repo "$REPO" --head "$branch" \
                            --state merged --json number --jq 'length')

            if [[ "$merged_count" -gt 0 ]]; then
              echo "MERGED: $branch (had merged PR) — cleaning up"

              # Delete remote branch (Vercel auto-tears-down its preview)
              gh api -X DELETE "repos/$REPO/git/refs/heads/$branch" \
                || echo "  (branch already gone)"

              # Comment + close the issue if still open
              state=$(gh issue view "$issue_num" --repo "$REPO" --json state --jq '.state' 2>/dev/null || echo "MISSING")
              if [[ "$state" == "MISSING" ]]; then
                echo "  issue #$issue_num not found, skipping comment"
                continue
              fi

              gh issue comment "$issue_num" --repo "$REPO" --body "$(printf '%s\n' \
                ':broom: **Cleanup** — branch `'"$branch"'` 已合併進 `main`，遠端 branch 與 Vercel preview 已自動清理。' \
                '' \
                '本地 `.worktree/'"$issue_num"'` 與本地 branch 保留，待你說「clean up issue '"$issue_num"'」再處理。')"

              if [[ "$state" == "OPEN" ]]; then
                gh issue close "$issue_num" --repo "$REPO" --reason completed || true
              fi
            else
              echo "skip: $branch has no merged PR"
            fi
          done
